<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ website.net_name }}</title>
    
    {% if website.ui_style == 'modern' %}
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .nav { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background-color: var(--bg-dark); }
        .logo { font-size: 24px; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent); }
        .back-link { text-decoration: none; color: var(--text-muted); font-size: 14px; }
        .reader-view { display: none; } .list-view { display: block; }
        .dynamic-card { padding: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; cursor: pointer; }
        .dynamic-card h3 { color: #fff; margin:0 0 10px 0; }
        .dynamic-card p { color: var(--text-muted); margin:0; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
        body { color: #fff; font-family: 'Inter', sans-serif; background: var(--bg-main); }
    </style>
    {% elif website.ui_style == 'dark' %}
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #d4d4d4; font-family: 'Crimson Pro', serif; margin: 0; line-height: 1.8; }
        .nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1f1f1f; }
        .logo { font-size: 28px; font-weight: 700; text-decoration: none; color: #ff3b3b; letter-spacing: 2px; text-transform: uppercase; }
        .back-link { text-decoration: none; color: #888; font-family: sans-serif; }
        .app-container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .reader-view { display: none; } .list-view { display: block; }
        .search-container { margin-bottom: 30px; }
        .search-input { width: 100%; padding: 15px; border: 1px solid #333; background: #111; color: white; border-radius: 8px; }
        .dynamic-card { padding: 25px; background: #111; border-radius: 8px; margin-bottom: 20px; cursor: pointer; border-left: 3px solid transparent; transition: transform 0.2s;}
        .dynamic-card:hover { transform: translateX(10px); border-left-color: #ff3b3b; }
        .dynamic-card h3 { margin: 0 0 10px 0; font-size: 26px; color: #fff; }
        .dynamic-card p { margin: 0; color: #888; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
        .reader-title { font-size: 48px; color: #fff; line-height: 1.1; margin-bottom: 10px; }
        .reader-meta { color: #ff3b3b; text-transform: uppercase; font-family: sans-serif; font-size: 14px; margin-bottom: 50px;}
        .reader-body { font-size: 22px; }
    </style>
    {% elif website.ui_style == 'classic' %}
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4ecd8; color: #2c2724; font-family: 'Playfair Display', serif; margin: 0; line-height: 1.8; background-image: radial-gradient(#e6ddc5 1px, transparent 1px); background-size: 20px 20px; }
        .nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d5c8ab; }
        .logo { font-size: 28px; font-weight: 600; text-decoration: none; color: #2c2724; }
        .back-link { text-decoration: none; color: #6c5a49; }
        .app-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .reader-view { display: none; } .list-view { display: block; }
        .search-container { margin-bottom: 30px; }
        .search-input { width: 100%; padding: 15px; font-family: 'Playfair Display', serif; border: 1px solid #d5c8ab; background: rgba(255,255,255,0.5); border-radius: 4px; }
        .dynamic-card { padding: 20px 0; border-bottom: 1px solid #d5c8ab; cursor: pointer; }
        .dynamic-card h3 { margin: 0 0 10px 0; font-size: 24px; }
        .dynamic-card p { margin: 0; color: #6c5a49; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
        .reader-title { font-size: 42px; text-align: center; margin-bottom: 10px; }
        .reader-meta { text-align: center; color: #6c5a49; font-style: italic; margin-bottom: 40px; border-bottom: 1px solid #d5c8ab; padding-bottom: 20px; }
        .reader-body { font-size: 20px; text-align: center; white-space: pre-wrap; }
    </style>
    {% elif website.ui_style == 'novel' %}
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
    <style>
        body { background-color: #faf9f6; color: #333; font-family: 'Merriweather', serif; margin: 0; line-height: 1.9; }
        .nav { padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eaeaea; background: #fff; }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: #b8860b; }
        .back-link { text-decoration: none; color: #666; font-family: sans-serif; text-transform: uppercase; letter-spacing: 1px; font-size: 14px;}
        .app-container { max-width: 650px; margin: 60px auto; padding: 0 20px; }
        .reader-view { display: none; } .list-view { display: block; }
        .search-container { margin-bottom: 40px; }
        .search-input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 4px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .dynamic-card { padding: 0 0 30px 0; margin-bottom: 30px; border-bottom: 1px solid #eaeaea; cursor: pointer; }
        .dynamic-card h3 { margin: 0 0 10px 0; font-size: 22px; color: #111; }
        .dynamic-card p { margin: 0; color: #555; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
        .reader-title { font-size: 36px; text-align: center; margin-bottom: 20px; color: #111; }
        .reader-meta { color: #888; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; margin-bottom: 60px; font-family: sans-serif; text-align: center; }
        .reader-body { font-size: 18px; text-align: justify; }
        .reader-body p { margin-bottom: 1.5em; text-indent: 2em; }
    </style>
    {% elif website.ui_style == 'glass' %}
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; font-family: sans-serif; margin: 0; min-height: 100vh; }
        .nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.2); }
        .logo { font-size: 24px; font-weight: bold; color: #fff; text-decoration: none; }
        .back-link { color: #fff; text-decoration: none; opacity: 0.8; }
        .app-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .reader-view { display: none; } .list-view { display: block; }
        .search-container { margin-bottom: 30px; }
        .search-input { width: 100%; padding: 15px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 12px; backdrop-filter: blur(5px); }
        .search-input::placeholder { color: rgba(255,255,255,0.7); }
        .dynamic-card { padding: 25px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 16px; margin-bottom: 20px; cursor: pointer; transition: background 0.3s;}
        .dynamic-card:hover { background: rgba(255,255,255,0.2); }
        .dynamic-card h3 { margin: 0 0 10px 0; font-size: 22px; }
        .dynamic-card p { margin: 0; opacity: 0.8; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;}
        .reader-view { background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); padding: 40px; border-radius: 20px; }
        .reader-title { margin-top: 0; }
        .reader-meta { opacity: 0.7; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; }
    </style>
    {% endif %}
</head>
<body>
    <div class="nav">
        <a href="/net/{{ website.net_name }}" class="logo">{{ website.net_name }}</a>
        <a href="/search" class="back-link">&larr; Global Network</a>
    </div>

    <div class="app-container list-view" id="list-view">
        <div class="search-container">
            <input type="text" id="search" class="search-input" placeholder="Search {{ website.net_name }}..." oninput="renderList()">
        </div>
        <div class="card-grid" id="grid"></div>
    </div>

    <div class="app-container reader-view" id="reader-view">
        <h1 id="r-title" class="reader-title"></h1>
        <div id="r-meta" class="reader-meta"></div>
        <div id="r-content" class="reader-body"></div>
    </div>

    <script>
        const NET_NAME = "{{ website.net_name }}";
        let articlesData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function init() {
            const res = await fetch('/api/articles');
            const data = await res.json();
            // Filter strictly by the net_name type
            articlesData = data.filter(a => (a.type || '').toLowerCase() === NET_NAME.toLowerCase());
            
            if (articleId) {
                const article = articlesData.find(a => a.id === articleId);
                if (article) {
                    showReader(article);
                    return;
                }
            }
            renderList();
        }

        function renderList() {
            const q = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const filtered = articlesData.filter(a => {
                if(!q) return true;
                return (a.title||'').toLowerCase().includes(q) || (a.body||'').toLowerCase().includes(q);
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="opacity:0.7;">No content found.</p>';
            }

            filtered.forEach(a => {
                const div = document.createElement('div');
                div.className = 'dynamic-card';
                div.onclick = () => window.location.href = `/net/${NET_NAME}?id=${a.id}`;
                div.innerHTML = `
                    <h3>${a.title}</h3>
                    <p style="margin-top:10px;">${a.body.replace(/<[^>]*>?/gm, '')}</p>
                `;
                grid.appendChild(div);
            });
        }

        function showReader(article) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            
            document.getElementById('r-title').innerText = article.title;
            const date = new Date(article.timestamp).toLocaleDateString();
            document.getElementById('r-meta').innerText = `By ${article.author || 'Creator'} • ${date} • ${article.views || 0} views`;
            document.getElementById('r-content').innerHTML = article.body;

            fetch('/api/visit/' + article.id, { method: 'POST' });
        }

        init();
    </script>
</body>
</html>
