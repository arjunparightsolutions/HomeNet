<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HomeNet</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0 60px 0;
            text-align: center;
        }
        .logo {
            font-size: 64px;
            font-weight: 700;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }
        .logo span {
            color: var(--accent);
        }
        .tagline {
            font-size: 18px;
            color: var(--text-muted);
            margin-bottom: 40px;
        }
        .search-form {
            width: 100%;
            max-width: 650px;
        }
        .quick-links {
            margin-top: 20px;
        }
        .quick-links button {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 5px;
        }
        .quick-links button:hover {
            background-color: var(--bg-hover);
            color: white;
            border-color: #3f3f46;
        }
        .feed-section {
            margin-top: 20px;
            padding-top: 40px;
            border-top: 1px solid var(--border);
        }
        .feed-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feed-header span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }
    </style>
</head>
<body>
    <div class="top-nav" style="padding: 15px 30px; display: flex; justify-content: flex-end;">
        <a href="/debug" class="nav-link">System Diagnostics</a>
    </div>

    <div class="app-container">
        <div class="hero-section">
            <h1 class="logo">Home<span>Net</span></h1>
            <p class="tagline">The Autonomous Global Network</p>
            
            <form action="/search" method="GET" class="search-form">
                <div class="search-container">
                    <input type="text" name="q" id="search-input" class="search-input" placeholder="Search the Global Network..." autocomplete="off" required>
                    <button type="submit" class="search-btn">
                        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
                <div class="quick-links">
                    <button type="button" onclick="window.location.href='/storynet'">StoryNet</button>
                    <button type="button" onclick="window.location.href='/poemnet'">PoemNet</button>
                    <button type="button" onclick="window.location.href='/blognet'">BlogNet</button>
                    <button type="button" onclick="window.location.href='/novelnet'">NovelNet</button>
                    <button type="button" onclick="window.location.href='/creatornet'" style="border-color: #8b5cf6; color: #8b5cf6;">CreatorNet Portal</button>
                </div>
            </form>
        </div>

        <div class="feed-section">
            <h2 class="feed-header"><span></span> Recently Published</h2>
            <div class="card-grid" id="feed-grid">
                <!-- Latest articles injected here -->
            </div>
        </div>
    </div>

    <script>
        function getTypeBadge(type) {
            const t = (type || 'blog').toLowerCase();
            if (t === 'poem') return `<span class="badge" style="background-color: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.2);">PoemNet</span>`;
            if (t === 'story') return `<span class="badge" style="background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2);">StoryNet</span>`;
            if (t === 'novel') return `<span class="badge" style="background-color: rgba(234, 179, 8, 0.1); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.2);">NovelNet</span>`;
            return `<span class="badge" style="background-color: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59,130,246,0.2);">BlogNet</span>`;
        }

        function getAppRoute(type, id) {
            const t = (type || 'blog').toLowerCase();
            if (t === 'article' || t === 'blog') return `/blognet?id=${id}`;
            if (['poem', 'story', 'novel'].includes(t)) {
                return `/${t}net?id=${id}`;
            }
            return `/net/${type}?id=${id}`;
        }

        async function fetchLatest() {
            try {
                const res = await fetch('/api/articles');
                const articles = await res.json();
                
                // Sort newest first
                articles.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                const grid = document.getElementById('feed-grid');
                if (articles.length === 0) {
                    grid.innerHTML = '<p style="color:var(--text-muted);">No content published yet.</p>';
                    return;
                }

                // Show top 6
                const latest = articles.slice(0, 6);
                
                latest.forEach((article, index) => {
                    const date = new Date(article.timestamp).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
                    let previewText = article.body || '';
                    previewText = previewText.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...';
                    
                    const card = document.createElement('div');
                    card.className = 'card animate-up';
                    card.style.animationDelay = `${(index % 6) * 0.05}s`;
                    card.onclick = () => window.location.href = getAppRoute(article.type, article.id);

                    card.innerHTML = `
                        <h3>${article.title || 'Untitled'}</h3>
                        <div class="card-meta">
                            ${getTypeBadge(article.type)}
                            <span class="date" style="margin-left:auto;">${date}</span>
                        </div>
                        <p class="preview" style="margin-top:10px;">${previewText}</p>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                console.error('Failed to load feed:', e);
            }
        }

        fetchLatest();
        // Auto refresh feed every 15s
        setInterval(() => {
            document.getElementById('feed-grid').innerHTML = '';
            fetchLatest();
        }, 15000);
    </script>
</body>
</html>
