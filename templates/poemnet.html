<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PoemNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4ecd8;
            color: #2c2724;
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 0;
            line-height: 1.8;
            background-image: radial-gradient(#e6ddc5 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #d5c8ab;
        }
        .logo {
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: #2c2724;
        }
        .back-link {
            text-decoration: none;
            color: #6c5a49;
            font-size: 16px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .reader-view { display: none; }
        .list-view { display: block; }
        
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-family: 'Playfair Display', serif;
            border: 1px solid #d5c8ab;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            margin-bottom: 30px;
        }
        .poem-card {
            padding: 20px 0;
            border-bottom: 1px solid #d5c8ab;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .poem-card:hover { opacity: 0.7; }
        .poem-card h3 { margin: 0 0 10px 0; font-size: 24px; }
        .poem-card p { margin: 0; color: #6c5a49; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Reader */
        .title { font-size: 42px; text-align: center; margin-bottom: 10px; }
        .meta { text-align: center; color: #6c5a49; font-style: italic; margin-bottom: 40px; border-bottom: 1px solid #d5c8ab; padding-bottom: 20px; }
        .content { font-size: 20px; text-align: center; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/poemnet" class="logo">PoemNet.</a>
        <a href="/search" class="back-link">&larr; Back to Global Network</a>
    </div>

    <div class="container" id="list-view">
        <input type="text" id="search" class="search-input" placeholder="Search poems..." oninput="renderList()">
        <div id="grid"></div>
    </div>

    <div class="container reader-view" id="reader-view">
        <h1 class="title" id="r-title"></h1>
        <div class="meta" id="r-meta"></div>
        <div class="content" id="r-content"></div>
    </div>

    <script>
        let articlesData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function init() {
            const res = await fetch('/api/articles');
            const data = await res.json();
            // Filter only poems
            articlesData = data.filter(a => (a.type || '').toLowerCase() === 'poem');
            
            if (articleId) {
                const article = articlesData.find(a => a.id === articleId);
                if (article) {
                    showReader(article);
                    return;
                }
            }
            renderList();
        }

        function renderList() {
            const q = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const filtered = articlesData.filter(a => {
                if(!q) return true;
                return (a.title||'').toLowerCase().includes(q) || (a.body||'').toLowerCase().includes(q);
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p>No poems found.</p>';
            }

            filtered.forEach(a => {
                const div = document.createElement('div');
                div.className = 'poem-card';
                div.onclick = () => window.location.href = `/poemnet?id=${a.id}`;
                div.innerHTML = `<h3>${a.title}</h3><p>${a.body.replace(/<[^>]*>?/gm, '')}</p>`;
                grid.appendChild(div);
            });
        }

        function showReader(article) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            
            document.getElementById('r-title').innerText = article.title;
            const date = new Date(article.timestamp).toLocaleDateString();
            document.getElementById('r-meta').innerText = `Penned by ${article.author || 'AI'} • ${date} • ${article.views || 0} views`;
            document.getElementById('r-content').innerHTML = article.body;

            fetch('/api/visit/' + article.id, { method: 'POST' });
        }

        init();
    </script>
</body>
</html>
