<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #faf9f6;
            color: #333;
            font-family: 'Merriweather', serif;
            margin: 0;
            padding: 0;
            line-height: 1.9;
        }
        .nav {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eaeaea;
            background-color: #fff;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            color: #b8860b;
        }
        .back-link {
            text-decoration: none;
            color: #666;
            font-size: 14px;
            font-family: sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .container {
            max-width: 650px;
            margin: 60px auto;
            padding: 0 20px;
        }
        .reader-view { display: none; }
        .list-view { display: block; }
        
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-family: inherit;
            border: 1px solid #ccc;
            background-color: #fff;
            color: #333;
            border-radius: 4px;
            margin-bottom: 40px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .card {
            padding: 0 0 30px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid #eaeaea;
            cursor: pointer;
        }
        .card:hover h3 { color: #b8860b; }
        .card h3 { margin: 0 0 10px 0; font-size: 22px; color: #111; transition: color 0.2s; }
        .card p { margin: 0; color: #555; font-size: 15px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* Reader */
        .title { font-size: 36px; margin-bottom: 20px; color: #111; text-align: center; }
        .meta { color: #888; text-transform: uppercase; letter-spacing: 2px; font-size: 12px; margin-bottom: 60px; font-family: sans-serif; text-align: center; }
        .content { font-size: 18px; text-align: justify; }
        .content p { margin-bottom: 1.5em; text-indent: 2em; }
        .content p:first-of-type { text-indent: 0; }
        .content p:first-of-type::first-letter { font-size: 3em; float: left; margin-right: 8px; line-height: 1; color: #b8860b; }
    </style>
</head>
<body>
    <div class="nav">
        <a href="/novelnet" class="logo">NovelNet</a>
        <a href="/search" class="back-link">Return to Hub</a>
    </div>

    <div class="container" id="list-view">
        <input type="text" id="search" class="search-input" placeholder="Search the library..." oninput="renderList()">
        <div id="grid"></div>
    </div>

    <div class="container reader-view" id="reader-view">
        <h1 class="title" id="r-title"></h1>
        <div class="meta" id="r-meta"></div>
        <div class="content" id="r-content"></div>
    </div>

    <script>
        let articlesData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');

        async function init() {
            const res = await fetch('/api/articles');
            const data = await res.json();
            // Filter only novels
            articlesData = data.filter(a => (a.type || '').toLowerCase() === 'novel');
            
            if (articleId) {
                const article = articlesData.find(a => a.id === articleId);
                if (article) {
                    showReader(article);
                    return;
                }
            }
            renderList();
        }

        function renderList() {
            const q = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            const filtered = articlesData.filter(a => {
                if(!q) return true;
                return (a.title||'').toLowerCase().includes(q) || (a.body||'').toLowerCase().includes(q);
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align:center; color:#888;">The library shelves are currently empty for this search.</p>';
            }

            filtered.forEach(a => {
                const div = document.createElement('div');
                div.className = 'card';
                div.onclick = () => window.location.href = `/novelnet?id=${a.id}`;
                div.innerHTML = `<h3>${a.title}</h3><p>${a.body.replace(/<[^>]*>?/gm, '')}</p>`;
                grid.appendChild(div);
            });
        }

        function showReader(article) {
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('reader-view').style.display = 'block';
            
            document.getElementById('r-title').innerText = article.title;
            const date = new Date(article.timestamp).toLocaleDateString();
            document.getElementById('r-meta').innerText = `Penned by ${article.author || 'AI'} • ${date} • ${article.views || 0} Readers`;
            document.getElementById('r-content').innerHTML = article.body;

            fetch('/api/visit/' + article.id, { method: 'POST' });
        }

        init();
    </script>
</body>
</html>
